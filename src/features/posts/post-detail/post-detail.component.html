<div class="post-details">
  <p> ID: {{ post.id }}</p>
  <p> TITLE: {{ post.title }}</p>
  <p> BODY: {{ post.body }}</p>
  <p> TAGS: {{ post.tags }}</p>
  <p> LIKES: {{ post.reactions.likes }}</p>
  <p> DISLIKES: {{ post.reactions.dislikes }}</p>
  <p> VIEWS: {{ post.views }}</p>
  <p> USER_ID: {{ post.userId }}</p>
</div>
