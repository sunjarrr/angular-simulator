@if (isLoading) {
  <div class="card">
    <p-table  [tableStyle]="{ 'min-width': '50rem' }">
      <ng-template #header>
        <tr>
          <th>Title</th>
          <th>Tags</th>
          <th>View</th>
        </tr>
      </ng-template>
      <ng-template #body let-elements>
        <tr>
          <td><p-skeleton /></td>
          <td><p-skeleton /></td>
          <td><p-skeleton /></td>
        </tr>
      </ng-template>
    </p-table>
  </div>
} @else {
  <div class="p-table">
  <p-contextMenu [model]="menuItems" #contextMenu>
    
  </p-contextMenu>
  @if (router.url === '/posts') {
  <p-table
      [totalRecords]="totalRecords"
      [paginator]="true"
      [first]="firstNumber"
      [rows]="pageSize"
      [contextMenu]="contextMenu"
      [value]="(posts$ | async) ?? []"
      [tableStyle]="{ 'min-width': '50rem' }"
      (onPage)="pageChange($event)"
      [rowsPerPageOptions]="[10, 20, 50]"
      [lazy]="true"
      [(contextMenuSelection)]="selectedPost"
   >
    <ng-template #header>
      <tr>
        <th>Title</th>
        <th>Tags</th>
        <th>View</th>
      </tr>
    </ng-template>
    <ng-template #body let-post>
      <tr (dblclick)="onPostSelect(post.id)" [pContextMenuRow]="post">
        <td>{{ post.title }}</td>
        <td>{{ post.tags.join(', ') }}</td>
        <td>{{ post.views }}</td>
      </tr>
    </ng-template>
  </p-table>
  <button id="create-post" class="create-posts-btn" routerLink="/posts/create">Создать пост</button>
}
</div>
}
<router-outlet class="post"></router-outlet>
