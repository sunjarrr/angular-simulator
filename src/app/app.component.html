<div class="app-container">
@if ({isAuth: isLoggedIn$ | async}; as auth) {
  @if (auth.isAuth){
    <app-header></app-header>
  }

  <main class="router-outlet">
    <router-outlet></router-outlet>
  </main>

  @if (auth.isAuth){
    <app-footer></app-footer>
  }
}
</div>

<app-message></app-message>

<app-loader></app-loader>
